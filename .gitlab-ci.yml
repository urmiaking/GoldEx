stages:
  - docker

variables:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  DOTNET_NOLOGO: "true"
  Version: "1.1.${CI_PIPELINE_IID}"

docker-image:
  stage: docker
  tags:
    - self-hosted   # match your runner tag
  rules:
    # push to master
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success

    # release (tag)
    - if: '$CI_COMMIT_TAG'
      when: on_success

    # manual trigger (like workflow_dispatch)
    - when: manual

  script:
    - echo "Building Docker image version $Version"

    - |
      docker build --push \
        -t localhost:5000/goldex:latest \
        -t localhost:5000/goldex:$Version \
        -f src/App/Server/GoldEx.Server/Dockerfile \
        .

    - echo "Running initialization script"
    - sudo chmod +x /masoud/initialize.sh
    - sudo /masoud/initialize.sh
