name: docker-image

on:
  workflow_dispatch:    # Allow running the workflow manually from the GitHub UI
  push:
    branches:
      - 'master'        # Run the workflow when pushing to the master branch
  release:
    types:
      - published       # Run the workflow when a new GitHub release is published

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  VERSION: 1.0.${{ github.run_number }}
  REGISTRY: ghcr.io
  # Repository name is force-lowercased here to match GHCR requirements
  IMAGE_GOLDEX: ghcr.io/urmiaking/goldex/goldex
  IMAGE_KARAT: ghcr.io/urmiaking/goldex/goldex-karat

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ssh-key: ${{ secrets.DEPLOY_KEY }}
        fetch-depth: 0

    # Authenticate to GHCR using the built-in ephemeral GITHUB_TOKEN
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Set up Buildx context for advanced caching features
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image for goldex
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/App/Server/GoldEx.Server/Dockerfile
        push: true
        tags: |
          ${{ env.IMAGE_GOLDEX }}:latest
          ${{ env.IMAGE_GOLDEX }}:${{ env.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Docker image for goldex-karat
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/Calculator/Server/GoldEx.Calculator.Server/Dockerfile
        push: true
        tags: |
          ${{ env.IMAGE_KARAT }}:latest
          ${{ env.IMAGE_KARAT }}:${{ env.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push  # Wait for the cloud build job to complete successfully
    runs-on: self-hosted   # Switches execution context to your local machine
    steps:
    - name: Run initialization and deployment script
      run: |
        chmod +x /home/user/docker/goldex/refresh-apps.sh
        /home/user/docker/goldex/refresh-apps.sh